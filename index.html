<!DOCTYPE html>
<html>
<head>
  <title>Genre Map</title>

  <style>
    body {
      margin: 0;
      background: #1e1e1e;
      overflow: hidden;
      font-family: Arial;
      color: white;
    }

    #map {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .node {
      position: absolute;
      padding: 6px 10px;
      font-size: 13px;
      background: #2a2a2a;
      border-radius: 8px;
      border: 1px solid #555;
      cursor: pointer;
      text-align: center;
      z-index: 2;
      min-width: 80px;
    }

    .node:hover {
      background: #3a3a3a;
    }


    .tooltip {
      position: absolute;
      background: black;
      padding: 5px 8px;
      border-radius: 5px;
      font-size: 12px;
      display: none;
      white-space: nowrap;
    }
  </style>

</head>

<body>

<div id="map"></div>

<script>
const allNodes = [];
const data = {
  name: "Genres",
  children: [
    {
      name: "Metal",
      children: [
        {
          name: "Black", children: [
            { name: "Raw" },
            { name: "Symphonic" },
            { name: "Atmospheric" },
            { name: "War metal" },
            { name: "Viking metal" },
            { name: "Blackgaze" },
            { name: "Post-black" },
            { name: "Folk" },
            { name: "DSBM" },
            { name: "NSBM" }
          ]
        },
        {
          name: "Death", children: [
            { name: "Brutal" },
            { name: "Technical" },
            { name: "Death'n'roll" },
            { name: "Blackened" },
            { name: "Symphonic" },
            { name: "Old-school" }
          ]
        },
        {
          name: "Heavy", children: [
            { name: "Speed metal" },
            { name: "Glam metal" },
            { name: "Power metal" },
            { name: "Folk metal" }
            ]
        },
        {
          name: "Doom", children: [
            { name: "Drone" },
            { name: "Sludge" },
            { name: "Stoner" },
            { name: "Deathdoom" },
            { name: "Funeral" }
          ]
        },
        {
          name: "Thrash",
          children: [
            { name: "Groove" },
            { name: "Crossover" },
            { name: "Extreme metal" }
          ]
        },
        {
          name: "Metalcore", children: [
            { name: "Mathcore" },
            { name: "Deathcore" },
            { name: "Progressive" }
          ]
        }
      ]
    },
    {
      name: "Punk",
      children: [
        { name: "Hardcore" },
        { name: "Pop Punk" }
      ]
    },
    {
      name: "Electronic",
      children: [
        { name: "Techno" },
        { name: "House" },
        { name: "Ambient" }
      ]
    }
  ]
};
  

const map = document.getElementById("map");

let offsetX = 0;
let offsetY = 0;
let isDragging = false;
let startX, startY;

map.addEventListener("mousedown", (e) => {
  isDragging = true;
  startX = e.clientX - offsetX;
  startY = e.clientY - offsetY;
});

window.addEventListener("mousemove", (e) => {
  if (!isDragging) return;

  offsetX = e.clientX - startX;
  offsetY = e.clientY - startY;

  map.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
});

window.addEventListener("mouseup", () => {
  isDragging = false;
});
  
function createNode(node, x, y) {
  const el = document.createElement("div");
  el.className = "node";
  el.innerText = node.name;
  el.style.left = x + "px";
  el.style.top = y + "px";
  
  allNodes.push(el);

  map.appendChild(el);

  el.onclick = () => {
    if (node.children) {
      toggle(node, x, y, el, 0);
    }
  };

  return el;
}
function resolveAllOverlaps() {
  for (let i = 0; i < allNodes.length; i++) {
    for (let j = i + 1; j < allNodes.length; j++) {
      const a = allNodes[i];
      const b = allNodes[j];

      const rect1 = a.getBoundingClientRect();
      const rect2 = b.getBoundingClientRect();

      const overlap =
        !(rect1.right < rect2.left ||
          rect1.left > rect2.right ||
          rect1.bottom < rect2.top ||
          rect1.top > rect2.bottom);

      if (overlap) {
        // push BOTH nodes apart (not just one)
        const shift = 20;

        a.style.left = (parseFloat(a.style.left) - shift) + "px";
        b.style.left = (parseFloat(b.style.left) + shift) + "px";
      }
    }
  }
}
function removeChildren(parentEl) {
  const nodes = document.querySelectorAll(".node");
  const allLines = document.querySelectorAll(".line");

  allNodes.forEach(n => {
    if (n.parent === parentEl) {
      removeChildren(n);
      n.remove();
    }
  });

  allLines.forEach(l => {
    if (l.parent === parentEl) {
      l.remove();
    }
  });
}
function expand(node, x, y, parentEl, level = 0) {
  if (!node.children) return;

  const count = node.children.length;
  const spacingX = 160;
  const spacingY = 140 + level * 30;
  const totalWidth = (count - 1) * spacingX;

  node.children.forEach((child, i) => {
    const offset = level * 60;

    const perRow = 6; // max nodes per row
    const row = Math.floor(i / perRow);
    const col = i % perRow;

    const rowWidth = Math.min(perRow, count) * spacingX;
    const newX = x - rowWidth / 2 + col * spacingX;
    const newY = y + spacingY + row * 90; // push rows downward

    const childEl = createNode(child, newX, newY);
    childEl.parent = parentEl;

    // 👉 IMPORTANT: delay AFTER node is in DOM
    setTimeout(() => {
      for (let i = 0; i < 5; i++) {
        resolveAllOverlaps();
      }
      drawLine(parentEl, childEl);
    }, 10);

    childEl.onclick = () => {
      if (child.children) {
        toggle(child, newX, newY, childEl, level + 1);
      }
    };
  });
}
function toggle(node, x, y, el, level) {
  if (el.expanded) {
    removeChildren(el);
    el.expanded = false;
  } else {
    el.expanded = true;
    expand(node, x, y, el, level);
  }
}
function drawLine(parentEl, childEl) {
  const rect1 = parentEl.getBoundingClientRect();
  const rect2 = childEl.getBoundingClientRect();
  const mapRect = map.getBoundingClientRect();

  const startX = rect1.left + rect1.width / 2 - mapRect.left;
  const startY = rect1.top + rect1.height - mapRect.top;

  const endX = rect2.left + rect2.width / 2 - mapRect.left;
  const endY = rect2.top - mapRect.top;

  const line = document.createElement("div");

  const length = Math.hypot(endX - startX, endY - startY);
  const angle = Math.atan2(endY - startY, endX - startX) * 180 / Math.PI;

  line.style.position = "absolute";
  line.style.width = length + "px";
  line.style.height = "2px";
  line.style.background = "#666";
  line.style.left = startX + "px";
  line.style.top = startY + "px";
  line.style.transformOrigin = "0 0";
  line.style.transform = `rotate(${angle}deg)`;
  line.parent = parentEl;
  line.className = "line";

  map.appendChild(line);
}

// start
createNode(data, window.innerWidth / 2, 100);
</script>

</body>
</html>
